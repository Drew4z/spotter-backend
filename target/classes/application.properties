# ===============================
# 1. CONFIGURACI�N DEL SERVIDOR
# ===============================
server.port=8081
# Opcional: Si quieres que todas las rutas empiecen por /api
server.servlet.context-path=/api

# ===============================
# 2. BASE DE DATOS (PostgreSQL)
# ===============================
# Aseg�rate de crear la base de datos "spotter_db" en pgAdmin o Docker antes de arrancar
spring.datasource.url=jdbc:postgresql://localhost:5433/spotter_db
spring.datasource.username=postgres
spring.datasource.password=mysecretpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# 3. JPA / HIBERNATE (El ORM)
# ===============================
# "update": Crea las tablas si no existen, o las actualiza si cambias el c�digo. 
# NO borra los datos al reiniciar. (Ideal para desarrollo)
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola (Vital para depurar tu TFG)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto expl�cito para PostgreSQL (Optimiza el SQL generado)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# 4. GESTI�N DE ARCHIVOS (Multipart)
# ===============================
# Aunque los videos vayan a Cloudinary, necesitar�s subir fotos de perfil
# Aumentamos el l�mite por defecto (que es 1MB) a 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# 5. VARIABLES DE SEGURIDAD (JWT)
# ===============================
# Clave secreta para firmar tus tokens (Debe ser larga y aleatoria)
# Puedes generar una en: https://www.allkeysgenerator.com/ (256-bit)
security.jwt.secret-key=TuClaveSecretaSuperLargaYSeguraQueNadieDebeSaber123456
# Tiempo de expiraci�n del token (ej. 1 d�a en milisegundos: 86400000)
security.jwt.expiration-time=86400000

# ===============================
# 6. CONFIGURACI�N DE CLOUDINARY (Futuro)
# ===============================
# Cuando te registres en Cloudinary, pondr�s aqu� tus claves
# cloudinary.cloud-name=tu_nombre_cloud
# cloudinary.api-key=tu_api_key
# cloudinary.api-secret=tu_api_secret